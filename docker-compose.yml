version: '3.8'

services:
  # 后端服务（FastAPI）
  backend:
    build: .
    container_name: ai-fitness-coach-backend
    ports:
      - "8000:8000"
    volumes:
      # 挂载数据库文件（持久化数据）
      - ./backend/fitness.db:/app/backend/fitness.db
      # 挂载 .env 文件（配置环境变量）
      - ./.env:/app/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ai-fitness-network

  # 前端服务（可选，使用 Nginx 托管静态文件）
  # 如果需要，可以取消注释
  # frontend:
  #   image: nginx:alpine
  #   container_name: ai-fitness-coach-frontend
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./backend/static:/usr/share/nginx/html:ro
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - ai-fitness-network

networks:
  ai-fitness-network:
    driver: bridge
